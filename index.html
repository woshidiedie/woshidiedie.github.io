<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系方式</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #e6f0ff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
            color: #333;
            gap: 25px;
            padding: 20px;
        }
        .logo-img{
            width: 280px;
            height: 110px;
            object-fit: contain;
        }
        .qq-box {
            font-size: 20px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .copy-btn {
            padding: 6px 14px;
            border: none;
            background: #4080ff;
            color: #fff;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
        }
        .copy-btn:active {
            background: #2962cc;
        }
        .line2 {
            font-size: 18px;
            color: #555;
            text-align: center;
        }
        .name {
            font-size: 22px;
            font-weight: 600;
            color: #224488;
            text-align: center;
        }
    </style>
</head>
<body>
    <img src="logo.png" class="logo-img" alt="logo">

    <div class="qq-box">
        联系客服qq：3187787845
        <button class="copy-btn" onclick="copyQQ()">复制QQ</button>
    </div>
    <div class="line2">在线时间：11:00~24:00</div>
    <div class="name">-皇豪体育-</div>

    <script>
        // 兼容手机 + 电脑的稳定复制函数
        function copyQQ() {
            const qq = "3187787845";
            
            // 创建临时输入框（手机必需要这个才能复制）
            const input = document.createElement('input');
            input.value = qq;
            document.body.appendChild(input);
            input.select();
            input.setSelectionRange(0, 9999);
            
            // 执行复制
            document.execCommand('copy');
            document.body.removeChild(input);
            
            // 提示
            alert("QQ号复制成功！");
        }
    </script>
</body>
</html>
